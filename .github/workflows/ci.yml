name: CI

on:
  push:
    branches: [initial-mvp, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest -q
